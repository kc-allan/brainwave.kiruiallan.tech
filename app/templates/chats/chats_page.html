<div id="chats-list" class="hidden flex flex-col items-center bg-white p-5 h-[100%] w-[100%]">
	{% with chats = current_user.chats %}
	{% if chats %}
	{% for chat in chats %}
	<h1>{{chat}}</h1>
	{% endfor %}
	{% else %}
	<div class="flex flex-col items-center justify-center p-2">
		<a href="{{url_for('groups.create_group')}}" class="flex items-center p-2 bg-blue-200 rounded-md">
			<img class="w-[50px]  h-[50px] mx-2" src="../static/icons/group.png" alt="">
			<div class="flex flex-col items-center w-[100%] h-[100%]">
				<h1 class="text-lg font-bold">Start Conversation</h1>
				<h3 class="text-xs">Connect with peers</h3>
			</div>
		</a>
		<h1>or</h1>
		<input class="border-2 h-[40px] p-2 outline-none" type="text" placeholder="Enter username...">
	</div>
	<div class="flex flex-col w-[100%] border-t-2">
		<h1 class="text-lg font-bold border-b-2 p-2">Suggestions</h1>
		<ul id="chat-suggestions" class="">
			<li>
				<a href="" class="flex items-center border-b-2 hover:bg-gray-200">
					<img class="w-[50px] h-[50px] m-2" src="../static/images/sample_dp.png" alt="">
					<h1>Full Name</h1>
				</a>
			</li>
			<li>
				<a href="" class="flex items-center border-b-2 hover:bg-gray-200">
					<img class="w-[50px] h-[50px] m-2" src="../static/images/sample_dp.png" alt="">
					<h1>Full Name</h1>
				</a>
			</li>
			<li>
				<a href="" class="flex items-center border-b-2 hover:bg-gray-200">
					<img class="w-[50px] h-[50px] m-2" src="../static/images/sample_dp.png" alt="">
					<h1>Full Name</h1>
				</a>
			</li>
		</ul>
	</div>
	{% endif %}
	{% endwith %}
</div>
